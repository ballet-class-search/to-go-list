<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>行きたいところリスト</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="./styles.css?v=20260614-2"><link rel="stylesheet" href="./adjustments.css?v=20260614-1"><style>@media(max-width:720px){.filters label{white-space:nowrap}.filters select{max-width:100%}}</style></head><body><div class="royal-frame"><header class="hero"><div class="sparkles">✦　⋆　✧　　　　　　　　　✧　⋆　✦</div><div class="crown">♕</div><h1>行きたいところリスト</h1><p>ときめく場所を見つけて、特別な思い出をつくろう♡</p><button class="primary-button" id="openCreateButton">＋　新しく追加</button></header><main><section class="controls"><label class="search"><span>⌕</span><input id="searchInput" type="search" placeholder="スポット名・エリア・ジャンルで検索"><b>✦</b></label><nav class="category-tabs" id="categoryTabs"><button class="category-tab is-active" data-category="すべて">♕　すべて</button><button class="category-tab" data-category="ご飯">♜　ご飯</button><button class="category-tab" data-category="外出">♧　外出</button></nav><div class="filters"><label>● エリア<select id="areaFilter"><option value="">すべて</option></select></label><label>✤ ジャンル<select id="genreFilter"><option value="">すべて</option></select></label><label>￥ 予算<select id="budgetFilter"><option value="">すべて</option></select></label><label>♥ 進捗<select id="statusFilter"><option value="">すべて</option></select></label><button class="quiet-button" id="resetFiltersButton">リセット</button></div></section><section class="list-section"><div class="list-heading"><h2 id="resultHeading"></h2><p id="resultCount"></p></div><div class="spot-list" id="spotGrid"></div><div id="emptyState" hidden></div></section></main></div><dialog id="spotDialog"><form id="spotForm"><header class="dialog-header"><h2 id="formTitle"></h2><button type="button" id="closeDialogButton">×</button></header><input name="id" type="hidden"><div class="form-columns"><section class="form-panel"><h3>♕ 基本情報</h3><div class="photo-picker"><label class="photo-add"><input id="photoInput" type="file" accept="image/*" multiple hidden><span>▧</span>写真を追加<small>最大10枚</small></label><div class="photo-previews" id="photoPreviews"></div></div><label class="field">スポット名<input name="name" required></label><div class="form-row"><label class="field">カテゴリ<select name="category"></select></label><div class="field"><span>エリア</span><div class="area-input-row"><input id="areaInput"><button type="button" id="addAreaButton">＋</button></div><div class="area-chips" id="areaEditor"></div></div></div><div class="form-row"><label class="field">ジャンル<select name="genre"></select></label><label class="field">予算<select name="budget"></select></label></div><label class="field">説明<textarea name="description"></textarea></label><label class="field">メモ<textarea name="memo"></textarea></label></section><section class="form-panel"><label class="field">進捗ステータス<div class="status-segments" id="formStatusSegments"></div><input name="status" type="hidden"></label><label class="field">優先度<div class="star-input" id="starInput"></div><input name="priority" type="hidden"></label><label class="field visit-field">訪問日<input name="visitedDate" type="date"></label><label class="field visit-field">訪問記録<textarea name="visitLog"></textarea></label><div class="links-heading"><span>関連リンク</span><button type="button" id="addLinkButton">＋ リンクを追加</button></div><div id="linkEditor"></div></section></div><section class="photo-adjuster" id="photoAdjuster" hidden><header><h3>写真の表示を調整</h3><button type="button" id="closePhotoAdjuster">×</button></header><p>写真をドラッグして、カードに表示する位置を調整できます。</p><div class="adjuster-preview" id="adjusterPreview"><img id="adjusterImage"></div><label class="zoom-control">拡大率<input id="zoomRange" type="range" min="1" max="2.5" step=".05"><output id="zoomOutput"></output></label><footer><button class="quiet-button" id="resetPhotoAdjustment" type="button">中央に戻す</button><button class="primary-button" id="finishPhotoAdjustment" type="button">調整を完了</button></footer></section><footer class="form-actions"><button class="quiet-button" id="cancelFormButton" type="button">キャンセル</button><button class="primary-button">♕　保存する</button></footer></form></dialog><div id="toast" class="toast"></div><template id="spotCardTemplate"><article class="spot-card"><div class="gallery"><img class="gallery-image"><div class="gallery-placeholder">♕</div><button class="gallery-arrow gallery-prev">‹</button><button class="gallery-arrow gallery-next">›</button><div class="gallery-count"></div><div class="gallery-dots"></div></div><div class="card-content"><div class="card-title"><div><div class="chips"></div><h3></h3></div><span class="bookmark">♦</span></div><div class="budget-priority"><span class="budget-text"></span><span class="priority-stars"></span></div><div class="card-status"></div><p class="description"></p><div class="links"></div><div class="card-meta"></div><div class="card-actions"><button class="edit-button">✎ 編集</button><button class="delete-button">▱ 削除</button></div></div></article></template><script type="module" src="./app.js?v=20260614-3"></script></body></html>
