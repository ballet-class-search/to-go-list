<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="行きたい場所を写真と一緒に大切にしまうリスト">
  <title>行きたいところリスト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="royal-frame">
    <header class="hero">
      <div class="sparkles" aria-hidden="true">✦　⋆　✧　　　　　　　　　✧　⋆　✦</div>
      <div class="crown" aria-hidden="true">♕</div>
      <h1>行きたいところリスト</h1>
      <p>ときめく場所を見つけて、特別な思い出をつくろう♡</p>
      <button class="primary-button" id="openCreateButton" type="button">＋　新しく追加</button>
    </header>

    <main>
      <section class="controls">
        <label class="search"><span>⌕</span><input id="searchInput" type="search" placeholder="スポット名・エリア・ジャンルで検索"><b>✦</b></label>
        <nav class="category-tabs" id="categoryTabs">
          <button class="category-tab is-active" data-category="すべて">♕　すべて</button>
          <button class="category-tab" data-category="ご飯">♜　ご飯</button>
          <button class="category-tab" data-category="外出">♧　外出</button>
        </nav>
        <div class="filters">
          <label>● エリア<select id="areaFilter"><option value="">すべて</option></select></label>
          <label id="genreFilterLabel">✤ ジャンル<select id="genreFilter"><option value="">すべて</option></select></label>
          <label>￥ 予算<select id="budgetFilter"><option value="">すべて</option></select></label>
          <label>♥ 進捗<select id="statusFilter"><option value="">すべて</option></select></label>
          <button class="quiet-button" id="resetFiltersButton">リセット</button>
        </div>
      </section>

      <section class="list-section">
        <div class="list-heading"><h2 id="resultHeading">すべてのスポット</h2><p id="resultCount"></p></div>
        <div class="spot-list" id="spotGrid"></div>
        <div class="empty-state" id="emptyState" hidden><span>♕</span><h2>まだスポットがありません</h2><p>ときめく場所を追加しましょう。</p></div>
      </section>
    </main>
  </div>

  <dialog id="spotDialog">
    <form id="spotForm">
      <header class="dialog-header"><h2 id="formTitle">スポットを追加・編集</h2><button type="button" id="closeDialogButton">×</button></header>
      <input name="id" type="hidden">
      <div class="form-columns">
        <section class="form-panel">
          <h3>♕ 基本情報</h3>
          <div class="photo-picker">
            <label class="photo-add"><input id="photoInput" type="file" accept="image/*" multiple hidden><span>▧</span>写真を追加<small>最大10枚</small></label>
            <div class="photo-previews" id="photoPreviews"></div>
          </div>
          <label class="field">スポット名<input name="name" required placeholder="例）サンセットテラス レア"></label>
          <div class="form-row">
            <label class="field">カテゴリ<select name="category"></select></label>
            <div class="field area-field"><span>エリア</span><div class="area-input-row"><input id="areaInput" placeholder="例）東京都渋谷区"><button type="button" id="addAreaButton">＋</button></div><div class="area-chips" id="areaEditor"></div></div>
          </div>
          <div class="form-row">
            <label class="field">ジャンル<select name="genre"></select></label>
            <label class="field">予算<select name="budget"></select></label>
          </div>
          <label class="field">説明<textarea name="description" rows="2" placeholder="どんな場所？"></textarea></label>
          <label class="field">メモ<textarea name="memo" rows="2" placeholder="自由にメモを入力…"></textarea></label>
        </section>
        <section class="form-panel record-panel">
          <label class="field">進捗ステータス<div class="status-segments" id="formStatusSegments"></div><input name="status" type="hidden"></label>
          <label class="field">優先度<div class="star-input" id="starInput" aria-label="優先度"></div><input name="priority" type="hidden"></label>
          <label class="field visit-field">訪問日<input name="visitedDate" type="date"></label>
          <label class="field visit-field">訪問記録<textarea name="visitLog" rows="4" placeholder="思い出や感想を記録…"></textarea></label>
          <div class="links-heading"><span>関連リンク</span><button type="button" id="addLinkButton">＋ リンクを追加</button></div>
          <div class="link-editor" id="linkEditor"></div>
        </section>
      </div>
      <footer class="form-actions"><button class="quiet-button" id="cancelFormButton" type="button">キャンセル</button><button class="primary-button" type="submit">♕　保存する</button></footer>
    </form>
  </dialog>

  <div class="toast" id="toast"></div>
  <template id="spotCardTemplate"><article class="spot-card"><div class="gallery"><img class="gallery-image" alt=""><div class="gallery-placeholder">♕<small>PHOTO</small></div><button class="gallery-arrow gallery-prev" type="button">‹</button><button class="gallery-arrow gallery-next" type="button">›</button><div class="gallery-count"></div><div class="gallery-dots"></div></div><div class="card-content"><div class="card-title"><div><div class="chips"></div><h3></h3></div><span class="bookmark">♦</span></div><div class="budget-priority"><span class="budget-text"></span><span class="priority-stars"></span></div><div class="card-status"></div><p class="description"></p><div class="links"></div><div class="card-meta"></div><div class="card-actions"><button class="edit-button" type="button">✎ 編集</button><button class="delete-button" type="button">▱ 削除</button></div></div></article></template>
  <script type="module" src="./app.js"></script>
</body>
</html>
