<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="行きたい飲食店や外出スポットを管理するリスト"><title>行きたいところリスト</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet"><link rel="stylesheet" href="./styles.css"></head><body><header class="hero"><div class="hero__inner"><div><p class="eyebrow">MY NEXT FAVORITES</p><h1>行きたいところリスト</h1><p class="hero__description">気になるお店や、いつか行きたい場所をひとまとめに。次のおでかけを、ここから選ぼう。</p></div><button class="button button--primary hero__button" id="openCreateButton">＋ 新しく追加</button></div></header><main class="page-shell"><section class="controls"><label class="search"><span>⌕</span><input id="searchInput" type="search" placeholder="名前・エリア・メモから検索"></label><div class="tabs" id="categoryTabs"><button class="tab is-active" data-category="すべて">すべて</button><button class="tab" data-category="ご飯">ご飯</button><button class="tab" data-category="外出">外出</button></div><div class="filters"><label><span>エリア</span><select id="areaFilter"><option value="">すべて</option></select></label><label id="genreFilterLabel"><span>ジャンル</span><select id="genreFilter"><option value="">すべて</option></select></label><label><span>予算</span><select id="budgetFilter"><option value="">すべて</option></select></label><label><span>進捗</span><select id="statusFilter"><option value="">すべて</option></select></label><button class="button" id="resetFiltersButton">リセット</button></div></section><section class="list-section"><div class="list-heading"><div><p class="section-kicker">YOUR LIST</p><h2 id="resultHeading">すべてのスポット</h2></div><p id="resultCount"></p></div><div class="spot-grid" id="spotGrid"></div><div class="empty-state" id="emptyState" hidden><h2 id="emptyTitle">まだスポットがありません</h2><p id="emptyDescription">気になる場所を追加しましょう。</p><button class="button button--primary" id="emptyCreateButton">新しく追加</button></div></section></main><dialog class="spot-dialog" id="spotDialog"><form class="spot-form" id="spotForm"><div class="dialog-header"><div><p class="section-kicker" id="formKicker">NEW SPOT</p><h2 id="formTitle">新しいスポットを追加</h2></div><button class="icon-button" id="closeDialogButton" type="button">×</button></div><input name="id" type="hidden"><section class="form-section"><div class="form-section__heading"><span>01</span><h3>基本情報</h3></div><div class="form-grid"><label class="field field--wide"><span>スポット名</span><input name="name" required></label><label class="field"><span>カテゴリ</span><select name="category"></select></label><label class="field"><span>ジャンル</span><select name="genre"></select></label><label class="field field--wide"><span>写真URL</span><input name="imageUrl" type="url"></label><label class="field field--wide"><span>説明</span><textarea name="description"></textarea></label><label class="field"><span>エリア</span><input name="area"></label><label class="field"><span>予算</span><select name="budget"></select></label><label class="field field--wide"><span>関連URL</span><input name="url" type="url"></label></div></section><section class="form-section"><div class="form-section__heading"><span>02</span><h3>管理・記録</h3></div><div class="form-grid"><label class="field"><span>進捗</span><select name="status"></select></label><label class="field"><span>優先度</span><select name="priority"></select></label><label class="field"><span>訪問予定日</span><input name="plannedDate" type="date"></label><label class="field visit-field"><span>訪問日</span><input name="visitedDate" type="date"></label><label class="field field--wide"><span>メモ</span><textarea name="memo"></textarea></label><label class="field field--wide visit-field"><span>訪問記録</span><textarea name="visitLog"></textarea></label></div></section><div class="form-actions"><button class="button" id="cancelFormButton" type="button">キャンセル</button><button class="button button--primary">保存する</button></div></form></dialog><div class="toast" id="toast"></div><template id="spotCardTemplate"><article class="spot-card"><div class="spot-card__visual"><img class="spot-card__image"><div class="spot-card__placeholder"><span>PLACE TO GO</span></div><span class="category-badge"></span><span class="priority-badge"></span></div><div class="spot-card__body"><div><p class="spot-card__meta"></p><h3></h3><a class="external-link" target="_blank">↗</a></div><p class="spot-card__description"></p><div class="detail-chips"></div><dl class="date-list"></dl><p class="spot-card__memo"></p><div class="status-control"><label><span>進捗</span><select class="card-status-select"></select></label></div><form class="quick-visit-form" hidden><label><span>訪問日</span><input name="visitedDate" type="date"></label><label><span>訪問記録</span><textarea name="visitLog"></textarea></label><button class="button button--secondary" type="submit">記録を保存</button></form><div class="card-actions"><button class="button button--small edit-button">編集</button><button class="button button--small button--danger delete-button">削除</button></div></div></article></template><script type="module" src="./app.js"></script></body></html>
